name: Live tests (opt-in)

# Runs the `live`-marked tests, which hit REAL external services:
#   * the public LACCD class-schedule + Program Mapper APIs (network), and
#   * a local Ollama model, if present (the AI round-trip SKIPS when absent,
#     which is the expected outcome on a hosted runner).
#
# These never run on push/pull_request — manual dispatch or a weekly schedule
# only — so day-to-day CI and PRs are never gated on network or external
# availability. Live tests are deselected by default everywhere else via
# pytest.ini (`addopts = -m "not live"`).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC

permissions:
  contents: read

jobs:
  live:
    name: live network round-trips
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned, hash-checked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Run live-marked tests (network required; -rs shows skips)
        run: python -m pytest -m live -rs
