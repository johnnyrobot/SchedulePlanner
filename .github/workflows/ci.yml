name: CI

# Offline, reproducible CI for EdgeSched.
#
# The gating `test` job installs the pinned, hash-checked dependency set from
# requirements.lock, so every run resolves the SAME package versions (and
# verifies their hashes). Live/network tests are deselected by default via
# pytest.ini (`addopts = -m "not live"`) and only ever run from live-tests.yml,
# so pull requests are never gated on network access.
#
# This workflow does NOT build, sign, or notarize any binary — the macOS bundle
# is produced (unsigned) by release-build.yml; signing is out of scope.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly heartbeat (Mondays 13:00 UTC) so the advisory drift job below runs
    # even with no commits.
    - cron: "0 13 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (locked deps, py${{ matrix.python-version }})
    # The app is a pywebview desktop app; app.py imports `webview` at module
    # load and the suite imports app. macOS ships the Cocoa/WebKit backend the
    # lock targets (pyobjc, darwin-only markers), so the suite imports cleanly.
    # A Linux/Windows runner would need a GTK/Qt backend (out of scope).
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned, hash-checked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Offline suite + live-deselect gate
        # scripts/run_qa.sh runs `pytest -m 'not live'` and asserts that exactly
        # the live-marked tests were deselected, so a silently added/removed live
        # test trips the gate.
        run: bash scripts/run_qa.sh

  lint:
    name: lint (ruff, critical rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff (pinned)
        run: pip install "ruff==0.15.11"
      - name: Ruff (syntax errors + undefined names only)
        # Intentionally minimal: pyflakes E9/F63/F7/F82 catch real breakage
        # (syntax errors, undefined names, broken f-strings) without imposing a
        # style on the existing, unformatted codebase.
        run: ruff check --select E9,F63,F7,F82 .

  audit:
    name: dependency CVE audit (pip-audit, gating)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip-audit (pinned)
        run: pip install "pip-audit==2.10.1"
      - name: Audit the hash-pinned lock (report/fail, NEVER --fix)
        # pip-audit queries the PyPI Advisory DB + OSV over the pinned versions in
        # requirements.lock and exits non-zero on ANY known vulnerability. We never
        # auto-fix: a forced bump (especially ortools) would change the CP-SAT
        # search path and break the determinism goldens, so a real advisory must go
        # through a human-reviewed lock regen + golden re-pin. Triaged-but-unfixable
        # advisories are documented one-per-line in .pip-audit-ignore. Runs on every
        # push/PR (gating) AND the weekly schedule, so a newly-disclosed CVE in an
        # unchanged lock trips the heartbeat even with no commits.
        run: |
          IGNORES=$(grep -vE '^[[:space:]]*(#|$)' .pip-audit-ignore \
            | awk '{print "--ignore-vuln", $1}' | tr '\n' ' ')
          pip-audit --requirement requirements.lock --desc $IGNORES

  sbom:
    name: SBOM + no-copyleft license gate
    # macos-latest so the FULL lock installs (the pyobjc/darwin-only packages too),
    # giving accurate per-component licenses. A package the gate canNOT see installed
    # (platform-conditional win32/.NET/Qt backends) no longer hides a copyleft dep:
    # generate_sbom.py resolves those from a human-vetted license map and FAILS the
    # gate (unverified_components) on any license it still cannot verify — so an
    # UNKNOWN license can never silently pass, on any runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install pinned deps (so component licenses resolve)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Generate CycloneDX SBOM + fail on GPL/AGPL (no copyleft in bundle)
        # Exits non-zero if a non-exempt GPL/AGPL component is in the lock; the
        # bundled Temurin JRE (GPL-2.0-with-classpath-exception) is carried in the
        # SBOM but gate-exempt with a documented reason — never silently dropped.
        run: python3 scripts/generate_sbom.py --out sbom.cyclonedx.json
      - name: Upload the CycloneDX SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 14

  build-verify:
    name: build-resource verifier self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resource-checker negative control (portable; no bundle needed)
        # Proves the build resource checker actually fails on a bundle missing
        # the OR-Tools native lib. The --self-test path uses only mktemp + find,
        # so it runs on any OS without producing a real bundle. The full bundle
        # verification runs in release-build.yml on macOS.
        run: bash scripts/verify_macos_build.sh --self-test

  drift:
    name: dependency drift canary (advisory)
    # Scheduled-only and non-blocking: installs the LOOSE requirements.txt to
    # detect when upstream releases drift away from requirements.lock (e.g. a new
    # serializer release that breaks byte-identical fixtures). It never gates PRs.
    if: github.event_name == 'schedule'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install loose (unpinned) requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Offline suite against floating deps (non-blocking)
        run: bash scripts/run_qa.sh
